<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Manuel Vega Cuadrado</title>
    <style>
        /* Diseño Premium: Azul Oxford y Oro */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0A1C2E; /* Fondo Azul Oxford */
            color: #FFFFFF; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background-color: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 20px; 
            text-align: center; 
            max-width: 350px; 
            width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(181, 149, 92, 0.3); 
        }
        .profile-pic { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background-color: #B5955C; /* Oro suave */
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 36px; 
            font-weight: bold; 
            color: #0A1C2E; 
        }
        h1 { margin: 0; font-size: 24px; color: #FFFFFF; }
        h2 { margin: 5px 0 30px; font-size: 16px; color: #B5955C; font-weight: 400; letter-spacing: 1px; }
        
        /* Botón Principal */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px 0; 
            margin-bottom: 15px; 
            background-color: #B5955C; 
            color: #0A1C2E; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px; 
            transition: all 0.3s ease; 
        }
        .btn:hover { background-color: #d1b279; transform: translateY(-2px); }
        
        /* Botón Secundario */
        .btn-outline { 
            background-color: transparent; 
            color: #B5955C; 
            border: 2px solid #B5955C; 
        }
        .btn-outline:hover { background-color: rgba(181, 149, 92, 0.1); }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-pic">MV</div>
        <h1>Manuel Vega Cuadrado</h1>
        <h2>CEO | IA NFC</h2>
        
        <a href="contacto.vcf" class="btn" target="_blank">Añadir a Contactos</a>
        <a href="Propuesta_Placas_NFC.pdf" class="btn btn-outline" download>Descargar Propuesta placas</a>
    </div>

</body>
</html>
